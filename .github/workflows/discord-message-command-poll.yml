name: Discord Message Command Poll

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      burst_count:
        description: Number of sequential poll requests to run
        required: false
        default: "5"

concurrency:
  group: discord-message-command-poll
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DISCORDOS_MESSAGE_COMMAND_GITHUB_AUDIENCE: discordos-message-command-poll
      DISCORDOS_MESSAGE_COMMAND_POLL_URL: https://fawxzzy-discordos.vercel.app/api/discord-message-commands-poll
    steps:
      - name: Poll hosted DiscordOS message commands
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            burst_count="${{ inputs.burst_count }}"
          else
            burst_count="3"
          fi

          if ! [[ "${burst_count}" =~ ^[0-9]+$ ]] || [ "${burst_count}" -le 0 ]; then
            echo "Invalid burst_count: ${burst_count}" >&2
            exit 1
          fi

          separator='?'
          case "${ACTIONS_ID_TOKEN_REQUEST_URL}" in
            *\?*) separator='&' ;;
          esac
          token_request_url="${ACTIONS_ID_TOKEN_REQUEST_URL}${separator}audience=${DISCORDOS_MESSAGE_COMMAND_GITHUB_AUDIENCE}"

          for iteration in $(seq 1 "${burst_count}"); do
            echo "::group::poll iteration ${iteration}/${burst_count}"
            token_response="$(curl -fsSL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${token_request_url}")"
            oidc_token="$(node -p "JSON.parse(process.argv[1]).value" "${token_response}")"
            echo "::add-mask::${oidc_token}"

            response_status="$(curl -sS -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer ${oidc_token}" \
              -H "Cache-Control: no-cache" \
              "${DISCORDOS_MESSAGE_COMMAND_POLL_URL}")"
            cat response.json
            echo

            if [ "${response_status}" -lt 200 ] || [ "${response_status}" -ge 300 ]; then
              echo "Poll request failed with status ${response_status}" >&2
              exit 1
            fi

            processed_count="$(node -p "const fs=require('fs'); const body=JSON.parse(fs.readFileSync('response.json','utf8')); Array.isArray(body.processed) ? body.processed.length : 0" )"
            rm -f response.json
            echo "::endgroup::"

            if [ "${processed_count}" -eq 0 ]; then
              exit 0
            fi

            sleep 5
          done
